<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24C実習スケジュール</title>
<link rel="icon" href="favicon3.ico">

<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');

body {
  font-family: sans-serif;
  background: #FFFFFF;
  color: #000000;
  padding: 20px;
  max-width: 700px;
  margin: auto;
  line-height: 1.6;
}

h2 {
  font-family: "Oswald", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  font-weight: 600;
  font-size: 36px;
  letter-spacing: -0.04em;
  color: #004CA0;
}
h2 .subtitle {
  font-size: 0.5em;
}

.select-wrapper {
  position: relative;
  margin-bottom: 10px;
}

select {
  width: 100%;
  padding: 12px;
  padding-right: 40px;
  border-radius: 0px;
  border: none;
  font-size: 16px;
  background: #004CA0;
  color: #FFFFFF;
  appearance: none;
}

.select-wrapper::after {
  content: "";
  position: absolute;
  right: 15px;
  top: 50%;
  width: 10px;
  height: 10px;
  border-right: 2px solid white;
  border-bottom: 2px solid white;
  transform: translateY(-50%) rotate(45deg);
  pointer-events: none;
}

.today {
  margin-bottom: 20px;
  font-size: 0.95em;
  color: #555;
}

.card {
  background: #FFFFFF;
  padding: 20px;
  border-radius: 0px;
  margin-bottom: 16px;
  border: 2px solid #DBDBDB;
}

.label {
  font-size: 0.9em;
  color: #666;
}

.now {
  color: #004CA0;
  font-size: 1.5em;
  font-weight: bold;
}

.next {
  color: #004CA0;
  font-size: 1.3em;
  font-weight: bold;
}

.warning {
  color: #C9A333;
  font-weight: bold;
  font-size: 1.4em;
}

.sub {
  margin-top: 8px;
  color: #555;
  line-height: 1.6;
}


ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

a {
  color: #999;
  text-decoration: none;
}

a:hover {
  color: #000;
}

.flex {
  display: flex;
}

hr {
  height: 1px;
  border: 0;
  border-top: 1px solid #bdbdbd7d;
}

.footer {
  padding-top: 50px;
  font-size: 14px;
  color: #999;
  background: #;
}

.footer__navi {
  flex-wrap: wrap;
  margin-bottom: 1.4rem;
}

.footer__navi li {
  display: inline-block;
}

.footer__navi li:not(:last-child) {
  margin-right: 16px;
}

.footer__logo {
  display: inline-block;
  margin-bottom: 0.5rem;
}

.copyright {
	font-size: 12px;
	}

  
</style>
</head>

<body>

<h2>COMING UP<span class="subtitle"> - VER. MM</span></h2>

<!-- ▼ 班選択 -->
<div class="select-wrapper">
  <select id="groupSelect">
    <option disabled selected>班を選択してください</option>
    <option value="1">1班 (No.1～8)</option>
    <option value="2">2班 (No.9～16)</option>
    <option value="3">3班 (No.17～24)</option>
    <option value="4">4班 (No.25～32)</option>
    <option value="5">5班 (No.33～41)</option>
  </select>
</div>

<div id="today" class="today"></div>

<div class="card">
  <div class="label">次の実習（全3回）</div>
  <div id="currentTask" class="now"></div>
  <div id="currentDates" class="sub"></div>
</div>

<div class="card">
  <div class="label">レポート締切まで</div>
  <div id="deadline" class="warning"></div>
</div>

<div class="card">
  <div class="label">その次の実習</div>
  <div id="nextTask" class="next"></div>
  <div id="nextDate" class="sub"></div>
</div>

<script>

// ===== 日付フォーマット（半角）=====
function format(dateStr){
  const d=new Date(dateStr);
  const w=["日","月","火","水","木","金","土"];
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}(${w[d.getDay()]})`;
}

function today(){
  const d=new Date();
  const w=["日","月","火","水","木","金","土"];
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}(${w[d.getDay()]})`;
}

// ===== データ（ローテーション構造）=====
const rotations=[
{
dates:["2026-04-14","2026-04-21","2026-04-24"],
deadline:"2026-05-01",
tasks:{
1:"太陽光発電（計測室）",
2:"光通信（応用室）",
3:"シーケンスⅡ（自制Ⅰ）",
4:"誘導電動機（機器室）",
5:"ゲープロ（電算室）"
}
},
{
dates:["2026-06-01","2026-06-08","2026-06-15"],
deadline:"2026-07-08",
tasks:{
1:"光通信（応用室）",
2:"シーケンスⅡ（自制Ⅰ）",
3:"誘導電動機（機器室）",
4:"ゲープロ（電算室）",
5:"太陽光発電（計測室）"
}
}
];

// ===== 日数 =====
function days(target){
return Math.ceil((new Date(target)-new Date())/(1000*60*60*24));
}

// ===== 現在ローテ =====
function currentRotation(){
return rotations.find(r=>new Date()<=new Date(r.deadline));
}

// ===== 更新 =====
function update(){
const g=document.getElementById("groupSelect").value;
if(!g)return;

const cur=currentRotation();
const idx=rotations.indexOf(cur);

// 現在
document.getElementById("currentTask").innerText=cur.tasks[g];
document.getElementById("currentDates").innerHTML=
cur.dates.map((d,i)=>`${i+1}回目：${format(d)}（あと${days(d)}日）`).join("<br>");

// 締切
const dl=days(cur.deadline);
const el=document.getElementById("deadline");
el.innerText=`あと${dl}日（${format(cur.deadline)}）`;
if(dl<=3){ el.style.color="#d00000"; }

// 次
const next=rotations[idx+1];
if(next){
document.getElementById("nextTask").innerText=next.tasks[g];
document.getElementById("nextDate").innerText=
`${format(next.dates[0])}（あと${days(next.dates[0])}日）`;
}
}

// 初期化
document.getElementById("today").innerText=today();
document.getElementById("groupSelect").addEventListener("change",update);

</script>

<footer class="footer">

    <a href="#" class="footer__logo">
      <img src="https://raw.githubusercontent.com/mar-sander/comup/refs/heads/main/Mlogo2-bk800.png" width="64" alt="MM Logo" />
    </a>
    <ul class="footer__navi flex">
		<li><a href="https://sites.google.com/g.nagano-c.ed.jp/24c" target="_blank">HOME</a></li>
		<li><a href="https://raw.githubusercontent.com/mar-sander/comup/refs/heads/main/24c-schedule.png" target="_blank">予定表</a></li>

		<li><a href="https://mar-sander.github.io/day-counter/">〆切±</a></li>
    </ul>
  </div>  <hr />
  <p class="copyright">
    Copyright © M.M. All Rights Reserved.</p>
</footer>

</body>
</html>
